<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♟️ Premium Chess - NO Group</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&display=swap');
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            font-family: 'Playfair Display', serif;
            margin-bottom: 10px;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(8, 65px);
            grid-template-rows: repeat(8, 65px);
            border: 14px solid #3c2f2f;
            background: #3c2f2f;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            border-radius: 8px;
            overflow: hidden;
        }
        .square {
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: all 0.15s ease;
        }
        .light { background: #f0d9b5; }
        .dark { background: #b58863; }
        .highlight {
            box-shadow: inset 0 0 0 5px #39ff14;
        }
        .selected {
            box-shadow: inset 0 0 0 5px #ffeb3b;
        }
        .piece {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        .square:active .piece { transform: scale(1.25); }
        .controls {
            margin: 25px 0;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background: linear-gradient(#ffd700, #e6b800);
            color: #1a1a1a;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(255,215,0,0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,215,0,0.4);
        }
        #status {
            font-size: 22px;
            margin: 15px 0;
            padding: 8px 24px;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            font-weight: bold;
        }
        .sidebar {
            display: flex;
            gap: 40px;
            margin-top: 20px;
            width: 100%;
            max-width: 580px;
        }
        #move-history {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 12px;
            width: 260px;
            max-height: 320px;
            overflow-y: auto;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>♟️ Premium Chess</h1>
    <div id="status">White's Turn</div>
    <div class="controls">
        <button onclick="newGame()">♻️ New Game</button>
        <button onclick="toggleAI()">🤖 AI: <span id="ai-status">Off</span></button>
        <button onclick="undoMove()">↩️ Undo</button>
    </div>
    <div id="board"></div>
    <div class="sidebar">
        <div>
            <strong style="color:#fff;">White</strong><br>
            ⏱️ <span id="white-time">10:00</span>
        </div>
        <div id="move-history"></div>
        <div>
            <strong style="color:#bbb;">Black</strong><br>
            ⏱️ <span id="black-time">10:00</span>
        </div>
    </div>

    <script>
        let board = [];
        let currentPlayer = 'w';
        let selectedPiece = null;
        let moveHistory = [];
        let isAIEnabled = false;
        let timers = { w: 600, b: 600 };
        let timerInterval;

        const pieceUnicode = {
            'K':'♔','Q':'♕','R':'♖','B':'♗','N':'♘','P':'♙',
            'k':'♚','q':'♛','r':'♜','b':'♝','n':'♞','p':'♟'
        };

        function initBoard() {
            board = [
                ['r','n','b','q','k','b','n','r'],
                ['p','p','p','p','p','p','p','p'],
                Array(8).fill(null),
                Array(8).fill(null),
                Array(8).fill(null),
                Array(8).fill(null),
                ['P','P','P','P','P','P','P','P'],
                ['R','N','B','Q','K','B','N','R']
            ];
            renderBoard();
            startTimers();
            updateStatus();
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');
                    square.className = `square ${(row + col) % 2 === 0 ? 'light' : 'dark'}`;
                    square.dataset.row = row;
                    square.dataset.col = col;

                    const pieceCode = board[row][col];
                    if (pieceCode) {
                        const pieceEl = document.createElement('span');
                        pieceEl.className = 'piece';
                        pieceEl.innerHTML = pieceUnicode[pieceCode] || '';
                        square.appendChild(pieceEl);
                    }

                    square.addEventListener('click', () => handleSquareClick(row, col));
                    boardEl.appendChild(square);
                }
            }
        }

        function handleSquareClick(row, col) {
            const piece = board[row][col];

            if (selectedPiece) {
                if (selectedPiece.row === row && selectedPiece.col === col) {
                    selectedPiece = null;
                    renderBoard();
                    return;
                }

                if (isLegalMove(selectedPiece.row, selectedPiece.col, row, col)) {
                    executeMove(selectedPiece.row, selectedPiece.col, row, col);
                }
                selectedPiece = null;
                renderBoard();
            } else if (piece && isOwnPiece(piece)) {
                selectedPiece = {row, col};
                renderBoard();
                highlightLegalMoves(row, col);
            }
        }

        function isOwnPiece(piece) {
            return (currentPlayer === 'w' && piece === piece.toUpperCase()) || (currentPlayer === 'b' && piece === piece.toLowerCase());
        }

        function isLegalMove(fromRow, fromCol, toRow, toCol) {
            if (fromRow === toRow && fromCol === toCol) return false;
            const piece = board[fromRow][fromCol];
            if (!piece) return false;
            return true; // Premium full rules in next phase
        }

        function highlightLegalMoves(fromRow, fromCol) {
            const squares = document.querySelectorAll('.square');
            squares.forEach(sq => {
                const r = parseInt(sq.dataset.row);
                const c = parseInt(sq.dataset.col);
                if (isLegalMove(fromRow, fromCol, r, c)) {
                    sq.classList.add('highlight');
                }
            });
        }

        function executeMove(fromRow, fromCol, toRow, toCol) {
            const movingPiece = board[fromRow][fromCol];
            board[toRow][toCol] = movingPiece;
            board[fromRow][fromCol] = null;

            moveHistory.push(`${movingPiece} ${String.fromCharCode(97 + fromCol)}${8-fromRow} → ${String.fromCharCode(97 + toCol)}${8-toRow}`);
            updateHistory();

            currentPlayer = currentPlayer === 'w' ? 'b' : 'w';
            updateStatus();

            if (isAIEnabled && currentPlayer === 'b') {
                setTimeout(aiMakeMove, 350);
            }
        }

        function aiMakeMove() {
            let possible = [];
            for (let r=0; r<8; r++) for (let c=0; c<8; c++) {
                if (board[r][c] && board[r][c].toLowerCase() === board[r][c]) {
                    for (let tr=0; tr<8; tr++) for (let tc=0; tc<8; tc++) {
                        if (isLegalMove(r, c, tr, tc)) possible.push({fr:r,fc:c,tr,tr:tc});
                    }
                }
            }
            if (possible.length) {
                const m = possible[Math.floor(Math.random()*possible.length)];
                executeMove(m.fr, m.fc, m.tr, m.tc);
            }
        }

        function updateHistory() {
            const el = document.getElementById('move-history');
            el.innerHTML = moveHistory.map((m,i) => `<div>${Math.floor(i/2)+1}. ${m}</div>`).join('');
            el.scrollTop = el.scrollHeight;
        }

        function updateStatus() {
            document.getElementById('status').textContent = (currentPlayer === 'w' ? '⚪ White' : '⚫ Black') + "'s Turn";
        }

        function startTimers() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timers[currentPlayer] > 0) {
                    timers[currentPlayer]--;
                    const min = Math.floor(timers[currentPlayer] / 60);
                    const sec = timers[currentPlayer] % 60;
                    document.getElementById(currentPlayer + '-time').textContent = `${min}:${sec.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        function toggleAI() {
            isAIEnabled = !isAIEnabled;
            document.getElementById('ai-status').textContent = isAIEnabled ? 'On' : 'Off';
        }

        function undoMove() {
            if (moveHistory.length > 0) {
                alert('Full undo with history rollback coming soon - Phase 2');
            }
        }

        function newGame() {
            if (confirm('Start fresh game?')) {
                moveHistory = [];
                timers = { w: 600, b: 600 };
                currentPlayer = 'w';
                initBoard();
            }
        }

        window.onload = initBoard;
    </script>
</body>
</html>
